<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="960" viewBox="0 0 1100 960" role="img" aria-labelledby="title desc">
  <title id="title">AgentClaw 核心组件一览</title>
  <desc id="desc">展示 ChannelManager、Orchestrator、AgentLoop、ContextManager、ToolRegistry、SkillRegistry、MemoryStore 和 SubAgentManager 的职责。</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .row { fill: #f7f9fc; stroke: #8aa0b8; stroke-width: 1.8; rx: 14; }
      .row-alt { fill: #eef6ff; stroke: #8aa0b8; stroke-width: 1.8; rx: 14; }
      .title { font: 700 26px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #24364a; }
      .name { font: 700 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .desc { font: 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #40566f; }
      .caption { font: 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #6b7c8f; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="960"/>
  <text x="60" y="52" class="title">AgentClaw 核心组件一览</text>
  <text x="60" y="82" class="caption">读正文时可以把这张图当作索引：每个组件对应一类工程问题。</text>

  <g transform="translate(60,120)">
    <rect width="980" height="82" class="row"/>
    <text x="30" y="34" class="name">ChannelManager</text>
    <text x="280" y="32" class="desc">统一管理多渠道生命周期：启动、停止、广播。</text>
    <text x="280" y="58" class="desc">负责不同平台的消息格式适配。</text>

    <rect y="96" width="980" height="82" class="row-alt"/>
    <text x="30" y="130" class="name">Orchestrator</text>
    <text x="280" y="128" class="desc">会话调度中心：找 session、注入上下文。</text>
    <text x="280" y="154" class="desc">协调 AgentLoop 和渠道。</text>

    <rect y="192" width="980" height="82" class="row"/>
    <text x="30" y="226" class="name">AgentLoop</text>
    <text x="280" y="224" class="desc">核心循环：调 LLM、解析响应、执行工具。</text>
    <text x="280" y="250" class="desc">反馈结果，并控制迭代上限。</text>

    <rect y="288" width="980" height="82" class="row-alt"/>
    <text x="30" y="322" class="name">ContextManager</text>
    <text x="280" y="320" class="desc">上下文管理：token 估算、压缩。</text>
    <text x="280" y="346" class="desc">保护 tool pair 和 Frozen Snapshot。</text>

    <rect y="384" width="980" height="82" class="row"/>
    <text x="30" y="418" class="name">ToolRegistry</text>
    <text x="280" y="416" class="desc">工具注册表：管理核心工具、条件工具。</text>
    <text x="280" y="442" class="desc">连接 MCP 外部工具。</text>

    <rect y="480" width="980" height="82" class="row-alt"/>
    <text x="30" y="514" class="name">SkillRegistry</text>
    <text x="280" y="512" class="desc">技能目录：系统提示词注入轻量索引。</text>
    <text x="280" y="538" class="desc">按需加载完整操作手册。</text>

    <rect y="576" width="980" height="82" class="row"/>
    <text x="30" y="610" class="name">MemoryStore</text>
    <text x="280" y="608" class="desc">SQLite 持久化：对话历史、长期记忆。</text>
    <text x="280" y="634" class="desc">向量嵌入和 FTS5 全文搜索。</text>

    <rect y="672" width="980" height="82" class="row-alt"/>
    <text x="30" y="706" class="name">SubAgentManager</text>
    <text x="280" y="704" class="desc">子代理管理：工具黑名单、共享迭代预算。</text>
    <text x="280" y="730" class="desc">负责子会话清理。</text>
  </g>
</svg>
