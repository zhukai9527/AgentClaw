<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1280" viewBox="0 0 1200 1280" role="img" aria-labelledby="title desc">
  <title id="title">一条消息的完整旅程</title>
  <desc id="desc">展示用户消息从渠道进入，经过 Orchestrator、AgentLoop、工具和外部依赖，再返回用户的完整流程。</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .section { fill: #f7f9fc; stroke: #8aa0b8; stroke-width: 2; rx: 18; }
      .box { fill: #ffffff; stroke: #4f6f8f; stroke-width: 2; rx: 12; }
      .box-blue { fill: #eef6ff; stroke: #4f6f8f; stroke-width: 2; rx: 12; }
      .box-green { fill: #f0fbf4; stroke: #5d9b72; stroke-width: 2; rx: 12; }
      .title { font: 700 26px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #24364a; }
      .label { font: 700 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .text { font: 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #40566f; }
      .small { font: 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #52677d; }
      .arrow { stroke: #5e7895; stroke-width: 2.6; fill: none; marker-end: url(#arrowhead); }
      .loop { stroke: #7f65b7; stroke-width: 2.8; fill: none; marker-end: url(#arrowpurple); }
      .caption { font: 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #6b7c8f; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#5e7895"/>
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#7f65b7"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="1280"/>
  <text x="60" y="52" class="title">一条消息的完整旅程</text>
  <text x="60" y="82" class="caption">从聊天平台进入，到 Agent 思考、调用工具，再把结果返回给用户。</text>

  <rect x="370" y="115" width="460" height="86" class="box-green"/>
  <text x="600" y="146" text-anchor="middle" class="label">用户消息</text>
  <text x="600" y="172" text-anchor="middle" class="small">Telegram / WhatsApp / 钉钉 / 飞书</text>
  <text x="600" y="194" text-anchor="middle" class="small">企微 / QQ / Web</text>

  <rect x="120" y="265" width="960" height="165" class="section"/>
  <text x="160" y="305" class="label">ChannelManager</text>
  <text x="160" y="338" class="text">统一管理渠道生命周期：启动、停止、广播和格式适配</text>
  <text x="160" y="368" class="small">telegram.ts · whatsapp.ts · dingtalk.ts · feishu.ts</text>
  <text x="160" y="394" class="small">wecom.ts · qqbot.ts · ws.ts</text>
  <text x="160" y="420" class="small">平台消息 → 统一 UserMessage</text>

  <rect x="120" y="500" width="960" height="170" class="section"/>
  <text x="160" y="540" class="label">Orchestrator（会话管理器）</text>
  <text x="160" y="573" class="text">找到或创建 session · 注入系统提示词</text>
  <text x="160" y="603" class="text">注入平台格式提示和 Skill 目录</text>
  <text x="160" y="631" class="small">调用 ContextManager 压缩上下文，保护 tool_call / tool_result 配对</text>
  <text x="160" y="655" class="small">然后交给 AgentLoop</text>

  <rect x="120" y="740" width="960" height="295" class="section"/>
  <text x="160" y="780" class="label">AgentLoop：思考 - 行动 - 观察</text>
  <rect x="185" y="825" width="180" height="85" class="box-blue"/>
  <text x="275" y="860" text-anchor="middle" class="label">LLM 调用</text>
  <text x="275" y="887" text-anchor="middle" class="small">stream response</text>
  <rect x="425" y="825" width="180" height="85" class="box"/>
  <text x="515" y="860" text-anchor="middle" class="label">解析响应</text>
  <text x="515" y="887" text-anchor="middle" class="small">text / tool_call</text>
  <rect x="665" y="825" width="180" height="85" class="box"/>
  <text x="755" y="860" text-anchor="middle" class="label">判断</text>
  <text x="755" y="887" text-anchor="middle" class="small">是否有工具调用</text>
  <rect x="485" y="955" width="200" height="58" class="box-blue"/>
  <text x="585" y="990" text-anchor="middle" class="label">ToolRegistry</text>
  <rect x="840" y="955" width="170" height="58" class="box-green"/>
  <text x="925" y="990" text-anchor="middle" class="label">返回用户</text>
  <path d="M365 868 L425 868" class="arrow"/>
  <path d="M605 868 L665 868" class="arrow"/>
  <path d="M755 910 L755 984 L685 984" class="arrow"/>
  <path d="M845 868 L925 868 L925 955" class="arrow"/>
  <path d="M485 984 L275 984 L275 910" class="loop"/>
  <text x="770" y="945" class="small">是：执行工具，结果回到循环</text>
  <text x="860" y="850" class="small">否：生成最终回复</text>

  <rect x="120" y="1100" width="960" height="150" class="section"/>
  <text x="160" y="1140" class="label">外部依赖</text>
  <text x="160" y="1173" class="text">LLM API：Anthropic / OpenAI / Google / DeepSeek</text>
  <text x="160" y="1201" class="small">SQLite：对话历史 + 长期记忆 + 向量索引</text>
  <text x="160" y="1227" class="small">Chrome：浏览器自动化</text>
  <text x="430" y="1227" class="small">搜索：SearXNG / Bing / Google</text>

  <path d="M600 201 L600 265" class="arrow"/>
  <path d="M600 430 L600 500" class="arrow"/>
  <path d="M600 670 L600 740" class="arrow"/>
  <path d="M600 1035 L600 1100" class="arrow"/>
</svg>
