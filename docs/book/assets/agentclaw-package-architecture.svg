<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="960" viewBox="0 0 1200 960" role="img" aria-labelledby="title desc">
  <title id="title">AgentClaw 包依赖关系</title>
  <desc id="desc">展示 AgentClaw 从应用层、核心层、功能层到类型层的包依赖关系。</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .layer { fill: #f7f9fc; stroke: #8aa0b8; stroke-width: 2; rx: 16; }
      .layer-title { font: 700 24px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #24364a; }
      .box { fill: #ffffff; stroke: #4f6f8f; stroke-width: 2; rx: 12; }
      .box-alt { fill: #eef6ff; stroke: #4f6f8f; stroke-width: 2; rx: 12; }
      .label { font: 700 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .text { font: 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #40566f; }
      .small { font: 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #52677d; }
      .arrow { stroke: #5e7895; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .caption { font: 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #6b7c8f; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#5e7895"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="960"/>

  <text x="60" y="52" class="layer-title">AgentClaw 包依赖关系</text>
  <text x="60" y="82" class="caption">从用户入口到核心循环，再到功能包和共享类型定义。</text>

  <rect x="60" y="115" width="1080" height="205" class="layer"/>
  <text x="90" y="153" class="layer-title">应用层：用户直接使用</text>
  <rect x="110" y="185" width="230" height="95" class="box"/>
  <text x="225" y="222" text-anchor="middle" class="label">gateway</text>
  <text x="225" y="250" text-anchor="middle" class="text">HTTP / WS</text>
  <text x="225" y="274" text-anchor="middle" class="small">多渠道入口</text>
  <rect x="485" y="185" width="230" height="95" class="box"/>
  <text x="600" y="222" text-anchor="middle" class="label">web</text>
  <text x="600" y="250" text-anchor="middle" class="text">React 19</text>
  <text x="600" y="274" text-anchor="middle" class="small">Vite 构建</text>
  <rect x="860" y="185" width="230" height="95" class="box"/>
  <text x="975" y="222" text-anchor="middle" class="label">cli</text>
  <text x="975" y="250" text-anchor="middle" class="text">终端交互</text>
  <text x="975" y="274" text-anchor="middle" class="small">本地入口</text>

  <rect x="60" y="375" width="1080" height="180" class="layer"/>
  <text x="90" y="413" class="layer-title">核心层</text>
  <rect x="260" y="432" width="680" height="96" class="box-alt"/>
  <text x="600" y="462" text-anchor="middle" class="label">core</text>
  <text x="600" y="490" text-anchor="middle" class="text">AgentLoop · Orchestrator · ContextManager</text>
  <text x="600" y="516" text-anchor="middle" class="small">TaskManager · SubAgentManager · SkillRegistry</text>

  <rect x="60" y="610" width="1080" height="200" class="layer"/>
  <text x="90" y="648" class="layer-title">功能层</text>
  <rect x="110" y="675" width="275" height="100" class="box"/>
  <text x="248" y="707" text-anchor="middle" class="label">providers</text>
  <text x="248" y="734" text-anchor="middle" class="small">Claude / OpenAI / Gemini</text>
  <text x="248" y="758" text-anchor="middle" class="small">SmartRouter</text>
  <rect x="462" y="675" width="275" height="100" class="box"/>
  <text x="600" y="707" text-anchor="middle" class="label">tools</text>
  <text x="600" y="734" text-anchor="middle" class="small">工具注册表 / 内置工具</text>
  <text x="600" y="758" text-anchor="middle" class="small">MCP 客户端</text>
  <rect x="815" y="675" width="275" height="100" class="box"/>
  <text x="953" y="707" text-anchor="middle" class="label">memory</text>
  <text x="953" y="734" text-anchor="middle" class="small">SQLite / 向量嵌入</text>
  <text x="953" y="758" text-anchor="middle" class="small">FTS5</text>

  <rect x="60" y="850" width="1080" height="80" class="layer"/>
  <text x="90" y="897" class="layer-title">类型层</text>
  <text x="620" y="880" text-anchor="middle" class="text">types：LLMProvider · Message · Tool · AgentEvent</text>
  <text x="620" y="906" text-anchor="middle" class="small">MemoryStore · Skill</text>

  <path d="M225 280 L225 345 L600 345 L600 432" class="arrow"/>
  <path d="M600 280 L600 432" class="arrow"/>
  <path d="M975 280 L975 345 L600 345 L600 432" class="arrow"/>
  <path d="M600 528 L248 675" class="arrow"/>
  <path d="M600 528 L600 675" class="arrow"/>
  <path d="M600 528 L953 675" class="arrow"/>
  <path d="M248 775 L248 830 L600 830 L600 850" class="arrow"/>
  <path d="M600 775 L600 850" class="arrow"/>
  <path d="M953 775 L953 830 L600 830 L600 850" class="arrow"/>
</svg>
